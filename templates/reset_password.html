{% extends "base.html" %}

{% block title %}Vinicius Command — Reset Protocol{% endblock %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="glass-card reveal-text" style="max-width: 520px; width: 100%; padding: 2.5rem; border-top: 6px solid var(--brand-red);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 20px; height: 20px; background: var(--brand-red); border-radius: 4px; transform: rotate(45deg); box-shadow: var(--glow-red); margin: 0 auto 1.5rem;"></div>
            <h1 style="font-size: 1.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; margin-bottom: 0.25rem;">Recovery Matrix</h1>
            <p style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;">Bypass forgotten credentials</p>
        </div>

        {% if error %}
        <div style="margin-bottom: 1.5rem; color: white; background: rgba(227,30,36,0.2); border: 1px solid rgba(227,30,36,0.3); padding: 0.75rem; border-radius: var(--radius-sm); text-align: center; font-size: 0.8rem; font-weight: 700;">{{ error }}</div>
        {% endif %}

        <form method="post" action="/reset-password" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div style="margin-bottom: 0.5rem">
                <label style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; opacity: 0.9;">Operational ID</label>
                <input type="text" name="username" required class="modern-input" style="font-weight: 600; padding: 0.85rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="IDENTIFIER">
            </div>
            <div style="margin-bottom: 0.5rem">
                <label style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; opacity: 0.9;">Custom Security Question</label>
                <input type="text" name="security_question" required class="modern-input" style="font-weight: 600; padding: 0.85rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="Your requested security question">
            </div>
            <div style="margin-bottom: 0.5rem">
                <label style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; opacity: 0.9;">Security Answer</label>
                <input type="text" name="security_answer" required class="modern-input" style="font-weight: 600; padding: 0.85rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="Valid security response...">
            </div>
            
            <div style="margin-bottom: 0.5rem; margin-top: 1rem; border-top: 1px dashed var(--glass-border); padding-top: 1.5rem;">
                <label style="color: var(--accent-blue); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem;">New Secure Passphrase</label>
                <input type="password" name="new_password" required minlength="8" class="modern-input" style="font-weight: 600; padding: 0.85rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-modern btn-primary" style="width: 100%; padding: 1rem; justify-content: center; font-weight: 900; margin-top: 0.5rem; font-size: 0.9rem; border-color: rgba(227,30,36,0.8); background: rgba(227,30,36,0.1);">INITIATE RECOVERY</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.75rem; font-weight: 700;">
            <a href="/signin" style="color: var(--text-muted); text-decoration: none; font-weight: 900;">Return to Auth Login</a>
        </p>
    </div>
</div>
{% endblock %}
