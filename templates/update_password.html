{% extends "base.html" %}

{% block title %}Vinicius Command — Finalize Recovery{% endblock %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="glass-card reveal-text" style="max-width: 520px; width: 100%; padding: 2.5rem; border-top: 6px solid var(--accent-blue);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 20px; height: 20px; background: var(--accent-blue); border-radius: 4px; transform: rotate(45deg); box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); margin: 0 auto 1.5rem;"></div>
            <h1 style="font-size: 1.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; margin-bottom: 0.25rem;">Secure Reset</h1>
            <p style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;">Establish new security credentials</p>
        </div>

        <div id="error-box" style="display: none; margin-bottom: 1.5rem; color: white; background: rgba(227,30,36,0.2); border: 1px solid rgba(227,30,36,0.3); padding: 0.75rem; border-radius: var(--radius-sm); text-align: center; font-size: 0.8rem; font-weight: 700;"></div>
        <div id="success-box" style="display: none; margin-bottom: 1.5rem; color: #10B981; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); padding: 1rem; border-radius: 8px; text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem;"></div>

        <form id="reset-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <label style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; opacity: 0.9;">New Secure Passphrase</label>
                <input type="password" id="new_password" required minlength="8" class="modern-input" style="font-weight: 600; padding: 1rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="••••••••">
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.05em; margin-top: 0.75rem;">Minimum 8 characters required.</p>
            </div>
            
            <button type="submit" class="btn-modern btn-primary" style="width: 100%; padding: 1.25rem; justify-content: center; font-weight: 900; margin-top: 1rem; font-size: 0.9rem; letter-spacing: 0.1em; background: var(--accent-blue); border-color: var(--accent-blue);">AUTHORIZE UPDATE</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.75rem; font-weight: 700;">
            <a href="/signin" style="color: var(--text-muted); text-decoration: none; font-weight: 900;">Return to Auth Login</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('new_password').value;
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');
        
        // Supabase recovery links put parameters in the URL hash fragment
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');

        if (!accessToken) {
            errorBox.textContent = "Protocol Error: Secure recovery token missing or expired.";
            errorBox.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/update-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    access_token: accessToken,
                    refresh_token: refreshToken,
                    new_password: newPassword 
                })
            });

            const result = await response.json();

            if (response.ok) {
                successBox.textContent = "Security Configuration Updated Successfully!";
                successBox.style.display = 'block';
                document.getElementById('reset-form').style.display = 'none';
                setTimeout(() => window.location.href = '/signin', 2000);
            } else {
                errorBox.textContent = result.detail || "Recovery Synchronization Failed.";
                errorBox.style.display = 'block';
            }
        } catch (err) {
            errorBox.textContent = "Network Error: Infrastructure communication failure.";
            errorBox.style.display = 'block';
        }
    });
</script>
{% endblock %}
