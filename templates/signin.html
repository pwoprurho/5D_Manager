{% extends "base.html" %}

{% block title %}Vinicius Command — Sign In{% endblock %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg-deep);">
    <div class="glass-card reveal-text" style="max-width: 480px; width: 100%; padding: 2.5rem; border-top: 6px solid var(--brand-red); background: #000000; color: #FFFFFF;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="{{ '/dashboard' if user else '/' }}" style="text-decoration: none; color: inherit; display: block;">
                <img src="/static/assets/logo.png" alt="Vinicius Logo" style="width: 40px; height: 40px; object-fit: contain; margin: 0 auto 1rem; filter: drop-shadow(0 0 12px rgba(227, 30, 36, 0.4)); display: block;">
                <h1 style="font-size: 1.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; margin-bottom: 0.25rem; color: #FFFFFF;">Vinicius Command</h1>
            </a>
            <p style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;">Authenticate to proceed</p>
        </div>

        {% if error %}
        <div style="margin-bottom: 1.5rem; color: var(--text-primary); background: rgba(227,30,36,0.15); border: 1px solid rgba(227,30,36,0.25); padding: 0.75rem; border-radius: var(--radius-sm); text-align: center; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(5px);">{{ error }}</div>
        {% endif %}

        <form method="post" action="/signin" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div style="margin-bottom: 0.5rem">
                <label style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; opacity: 0.9;">Email / Username</label>
                <input type="text" name="username" required class="modern-input" style="font-weight: 600; padding: 0.85rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="name@email.com">
            </div>
            <div style="margin-bottom: 0.5rem">
                <label style="color: var(--text-muted); font-size: 0.70rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; opacity: 0.9;">Secure Passphrase</label>
                <div style="position: relative;">
                    <input type="password" id="signin_pass" name="password" required class="modern-input" style="font-weight: 600; padding: 0.85rem; padding-right: 2.5rem; width: 100%; box-sizing: border-box; font-size: 0.9rem;" placeholder="••••••••">
                    <button type="button" onclick="const p=document.getElementById('signin_pass'); p.type=p.type==='password'?'text':'password'; this.querySelector('i').classList.toggle('fa-eye'); this.querySelector('i').classList.toggle('fa-eye-slash');" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.25rem; outline: none;"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-modern btn-primary" style="width: 100%; padding: 1rem; justify-content: center; font-weight: 900; margin-top: 0.5rem; font-size: 0.9rem;">AUTHENTICATE</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.75rem; font-weight: 700;">
            Forgotten Passphrase? <a href="/reset-password" style="color: var(--brand-red); text-decoration: none; font-weight: 900;">Recover here</a>
        </p>

        <div style="margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 1rem;">New Operational Node?</p>
            <a href="/signup" class="btn-modern btn-ghost" style="width: 100%; padding: 0.85rem; justify-content: center; font-weight: 900; font-size: 0.75rem; border-color: rgba(255,255,255,0.1);">ENROLL NEW ACCOUNT</a>
        </div>
    </div>
</div>
{% endblock %}
